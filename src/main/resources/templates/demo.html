<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Cognitive AI Demo</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 24px;
        background: #f7f7f9;
      }
      h1 {
        margin-bottom: 4px;
      }
      .subtitle {
        margin-bottom: 24px;
        color: #555;
      }
      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
      }
      .card {
        background: white;
        padding: 16px;
        border-radius: 10px;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
      }
      textarea,
      input[type="text"] {
        width: 100%;
        padding: 8px;
        margin-top: 6px;
        margin-bottom: 12px;
        box-sizing: border-box;
      }
      button {
        padding: 10px 16px;
        cursor: pointer;
      }
      ul {
        padding-left: 20px;
      }
      .full {
        grid-column: 1 / -1;
      }
      .label {
        font-weight: bold;
      }
      pre {
        white-space: pre-wrap;
        word-break: break-word;
        background: #f1f1f1;
        padding: 10px;
        border-radius: 8px;
      }
    </style>
  </head>
  <body>
    <h1>Cognitive AI Demo Console</h1>
    <div class="subtitle">Observe → Decide → Route → Act → Remember</div>

    <div class="grid">
      <div class="card">
        <h2>Observation Input</h2>
        <label class="label">Source</label>
        <input id="source" type="text" value="user" />

        <label class="label">Content</label>
        <textarea
          id="content"
          rows="6"
          placeholder="Type an observation..."
        ></textarea>

        <label>
          <input id="explicitRemember" type="checkbox" />
          Explicit remember
        </label>

        <div style="margin-top: 12px">
          <button onclick="submitObservation()">Observe</button>
        </div>
      </div>

      <div class="card">
        <h2>Decision Output</h2>
        <div>
          <span class="label">Decision:</span> <span id="decision">-</span>
        </div>
        <div>
          <span class="label">Confidence:</span> <span id="confidence">-</span>
        </div>
        <div><span class="label">Intent:</span> <span id="intent">-</span></div>
        <div><span class="label">Agent:</span> <span id="agent">-</span></div>
        <div><span class="label">Message:</span></div>
        <pre id="message">-</pre>
      </div>

      <div class="card">
        <h2>Explainability</h2>
        <ul id="reasons"></ul>
      </div>

      <div class="card">
        <h2>Working Memory</h2>
        <ul id="workingMemory"></ul>
      </div>

      <div class="card">
        <h2>Conversation (session)</h2>
        <ul id="conversation"></ul>
      </div>

      <div class="card full">
        <h2>Pending Memory Candidates</h2>
        <ul id="candidates"></ul>
      </div>
    </div>

    <script>
      async function submitObservation() {
        const payload = {
          source: document.getElementById("source").value,
          content: document.getElementById("content").value,
          explicitRemember: document.getElementById("explicitRemember").checked,
          sessionId: localStorage.getItem("cognitive_session_id") || null,
        };

        const response = await fetch("/api/observe", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });

        if (response.status === 204) {
          document.getElementById("decision").textContent = "SILENCE";
          document.getElementById("confidence").textContent = "-";
          document.getElementById("intent").textContent = "-";
          document.getElementById("agent").textContent = "-";
          document.getElementById("message").textContent =
            "System chose silence.";
          document.getElementById("reasons").innerHTML =
            "<li>No response generated.</li>";
          await refreshMemory();
          return;
        }

        const data = await response.json();

        document.getElementById("decision").textContent = data.decision ?? "-";
        document.getElementById("confidence").textContent =
          data.confidence ?? "-";
        document.getElementById("intent").textContent = data.intent ?? "-";
        document.getElementById("agent").textContent = data.agent ?? "-";
        document.getElementById("message").textContent = data.message ?? "-";

        const reasons = document.getElementById("reasons");
        reasons.innerHTML = "";
        (data.reasons || []).forEach((reason) => {
          const li = document.createElement("li");
          li.textContent = reason;
          reasons.appendChild(li);
        });

        // Persist sessionId for multi-turn demo interactions
        if (data.sessionId) {
          localStorage.setItem("cognitive_session_id", data.sessionId);
        }

        await refreshMemory();
      }

      async function refreshMemory() {
        try {
          const sessionId = localStorage.getItem("cognitive_session_id");
          const wmUrl = sessionId
            ? `/api/demo/working-memory?sessionId=${encodeURIComponent(sessionId)}`
            : "/api/demo/working-memory";
          const wmResponse = await fetch(wmUrl);
          const workingMemory = await wmResponse.json();

          const wmList = document.getElementById("workingMemory");
          wmList.innerHTML = "";
          workingMemory.forEach((item) => {
            const li = document.createElement("li");
            li.textContent =
              `[${item.source}] ${item.content}` ?? JSON.stringify(item);
            wmList.appendChild(li);
          });

          // Build conversation view from persisted conversation entries
          try {
            const convResp = await fetch("/api/demo/conversation");
            const convEntries = await convResp.json();
            const conv = document.getElementById("conversation");
            conv.innerHTML = "";
            convEntries.forEach((entry) => {
              const li = document.createElement("li");
              li.style.marginBottom = "6px";
              const ts =
                entry.timestamp ||
                entry.timestampStr ||
                entry.timestampISO ||
                null;
              const time = ts ? new Date(ts).toLocaleString() : "";
              li.innerHTML = `<div style="font-size:12px;color:#666">${time}</div><div><strong>User:</strong> ${entry.input}</div><div><strong>Avery:</strong> ${entry.response}</div>`;
              conv.appendChild(li);
            });
          } catch (e) {
            console.error("Failed to load conversation entries", e);
          }
        } catch (e) {
          console.error("Failed to load working memory", e);
        }

        try {
          const candidatesResponse = await fetch("/api/memory/candidates");
          const candidates = await candidatesResponse.json();

          const candidateList = document.getElementById("candidates");
          candidateList.innerHTML = "";
          candidates.forEach((item) => {
            const li = document.createElement("li");
            const id =
              item.id || item.idStr || item.uuid || item.idString || "";
            const summary =
              item.summary || item.content || JSON.stringify(item);

            // header: summary + badge + timestamp
            const header = document.createElement("div");
            header.style.display = "flex";
            header.style.alignItems = "center";
            header.style.gap = "8px";

            const span = document.createElement("span");
            span.textContent = summary;
            header.appendChild(span);

            // status badge if present
            if (item.status) {
              const badge = document.createElement("span");
              badge.textContent = item.status;
              badge.style.background = "#eef";
              badge.style.border = "1px solid #cce";
              badge.style.padding = "2px 8px";
              badge.style.borderRadius = "999px";
              badge.style.fontSize = "12px";
              header.appendChild(badge);
            }

            // timestamp
            const created =
              item.createdAt || item.created_at || item.created || null;
            if (created) {
              const ts = document.createElement("small");
              try {
                const d = new Date(created);
                ts.textContent = d.toLocaleString();
              } catch (e) {
                ts.textContent = String(created);
              }
              ts.style.marginLeft = "auto";
              ts.style.color = "#666";
              header.appendChild(ts);
            }

            li.appendChild(header);

            const controls = document.createElement("div");
            controls.style.marginTop = "6px";
            controls.style.display = "flex";
            controls.style.alignItems = "center";
            controls.style.gap = "8px";

            const noteInput = document.createElement("input");
            noteInput.type = "text";
            noteInput.placeholder = "Reviewer note (optional)";
            noteInput.style.flex = "1";

            const acceptBtn = document.createElement("button");
            acceptBtn.textContent = "Accept";
            acceptBtn.disabled = !id;
            acceptBtn.onclick = () =>
              openReviewModal(id, true, noteInput.value);

            const rejectBtn = document.createElement("button");
            rejectBtn.textContent = "Reject";
            rejectBtn.disabled = !id;
            rejectBtn.onclick = () =>
              openReviewModal(id, false, noteInput.value);

            controls.appendChild(noteInput);
            controls.appendChild(acceptBtn);
            controls.appendChild(rejectBtn);

            if (!id) {
              const hint = document.createElement("small");
              hint.style.color = "#a33";
              hint.textContent = "ID missing — cannot accept/reject from demo";
              controls.appendChild(hint);
            }

            li.appendChild(controls);
            candidateList.appendChild(li);
          });
        } catch (e) {
          console.error("Failed to load candidates", e);
        }
      }

      // Modal dialog for accept/reject
      function createModalIfNeeded() {
        if (document.getElementById("reviewModal")) return;
        const modal = document.createElement("div");
        modal.id = "reviewModal";
        modal.style.position = "fixed";
        modal.style.left = "0";
        modal.style.top = "0";
        modal.style.right = "0";
        modal.style.bottom = "0";
        modal.style.background = "rgba(0,0,0,0.35)";
        modal.style.display = "flex";
        modal.style.alignItems = "center";
        modal.style.justifyContent = "center";

        const box = document.createElement("div");
        box.style.background = "white";
        box.style.padding = "16px";
        box.style.borderRadius = "8px";
        box.style.width = "480px";
        box.style.boxShadow = "0 6px 20px rgba(0,0,0,0.2)";

        const title = document.createElement("h3");
        title.id = "reviewModalTitle";
        title.textContent = "Review candidate";
        box.appendChild(title);

        const summary = document.createElement("div");
        summary.id = "reviewModalSummary";
        summary.style.marginBottom = "8px";
        box.appendChild(summary);

        const noteLabel = document.createElement("div");
        noteLabel.textContent = "Reviewer note";
        box.appendChild(noteLabel);

        const noteField = document.createElement("input");
        noteField.id = "reviewModalNote";
        noteField.type = "text";
        noteField.style.width = "100%";
        noteField.style.marginBottom = "12px";
        box.appendChild(noteField);

        const actions = document.createElement("div");
        actions.style.display = "flex";
        actions.style.justifyContent = "flex-end";
        actions.style.gap = "8px";

        const cancelBtn = document.createElement("button");
        cancelBtn.textContent = "Cancel";
        cancelBtn.onclick = () => {
          modal.style.display = "none";
        };

        const confirmBtn = document.createElement("button");
        confirmBtn.id = "reviewModalConfirm";
        confirmBtn.textContent = "Confirm";

        actions.appendChild(cancelBtn);
        actions.appendChild(confirmBtn);
        box.appendChild(actions);
        modal.appendChild(box);
        document.body.appendChild(modal);
      }

      function openReviewModal(id, accept, note) {
        createModalIfNeeded();
        const modal = document.getElementById("reviewModal");
        document.getElementById("reviewModalSummary").textContent =
          note && note.length ? note : `Candidate id: ${id}`;
        const noteField = document.getElementById("reviewModalNote");
        noteField.value = note || "";
        const confirmBtn = document.getElementById("reviewModalConfirm");
        confirmBtn.onclick = async () => {
          modal.style.display = "none";
          await acceptRejectCandidate(id, accept, noteField.value);
        };
        modal.style.display = "flex";
      }

      async function acceptRejectCandidate(id, accept, note) {
        if (!id) {
          // graceful handling: show inline non-blocking message
          console.warn(
            "Candidate id missing; cannot accept/reject from demo UI",
          );
          return;
        }
        const url = `/api/memory/candidates/${id}/${accept ? "accept" : "reject"}`;
        const payload = {
          note: note || (accept ? "Accepted via demo" : "Rejected via demo"),
        };
        try {
          const resp = await fetch(url, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
          if (resp.ok) {
            await refreshMemory();
          } else {
            const text = await resp.text();
            console.error("Failed to accept/reject:", resp.status, text);
          }
        } catch (err) {
          console.error("Error accepting/rejecting candidate:", err);
        }
      }

      refreshMemory();
    </script>
  </body>
</html>
