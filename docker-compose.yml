version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      # application.yml references these variables
      DATABASE_URL: "jdbc:postgresql://db:5432/cognitive_ai"
      DATABASE_USER: "postgres"
      DATABASE_PASSWORD: "postgres"

      # Spring AI OpenAI (optional): enable by setting OPENAI_API_KEY in your shell/.env
      # Spring will read this as `spring.ai.openai.api-key`.
      SPRING_AI_OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      SPRING_AI_OPENAI_CHAT_OPTIONS_MODEL: "${AI_MODEL:-gpt-4o-mini}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
    
    depends_on:
      db:
        condition: service_healthy

    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 25s
    restart: unless-stopped

  db:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_DB: "cognitive_ai"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "postgres"
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cognitive_ai >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    restart: unless-stopped

volumes:
  db-data:
